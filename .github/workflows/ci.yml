name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Publish browser and performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-browser-results-${{ github.run_attempt }}
          path: test-results/**
          if-no-files-found: warn
          retention-days: 30
