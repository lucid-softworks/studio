name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  e2e:
    name: Browser tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ steps.playwright.outputs.version }}
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Find latest main performance baseline
        id: baseline
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'completed',
              per_page: 20,
            })
            for (const run of runs.data.workflow_runs) {
              if (run.conclusion !== 'success' || run.id === context.runId) continue
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              })
              if (artifacts.data.artifacts.some((artifact) => artifact.name.startsWith('studio-browser-results-') && !artifact.expired)) return String(run.id)
            }
            return ''
      - name: Download performance baseline
        if: steps.baseline.outputs.result != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.baseline.outputs.result }}
          pattern: studio-browser-results-*
          merge-multiple: true
          path: .performance-baseline
      - run: pnpm test:e2e -- --shard=${{ matrix.shard }}/4
      - name: Compare browser performance with main
        if: always()
        run: node scripts/compare-performance.mjs test-results/performance .performance-baseline >> "$GITHUB_STEP_SUMMARY"
      - name: Publish browser and performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-browser-results-${{ github.run_attempt }}-shard-${{ matrix.shard }}
          path: test-results/**
          if-no-files-found: warn
          retention-days: 30
